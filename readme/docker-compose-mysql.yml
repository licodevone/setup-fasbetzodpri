services:
  db:
    image: mysql:8.4.9
    container_name: container_mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_USER: username
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
